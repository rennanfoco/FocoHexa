services:
  - type: web
    name: foco-hexa-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: IMAGE_MODEL
        value: openai/gpt-5-image-mini
      - key: FRONTEND_URL
        sync: false